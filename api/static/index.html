<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>국내 주가 ML·DL 웹앱</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>
    body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <main class="max-w-6xl mx-auto px-5 py-10">
    <header class="mb-8">
      <p class="text-indigo-300 text-sm">국내 증시 데이터 기반 시계열 프로젝트</p>
      <h1 class="text-3xl font-bold mt-1">주가 지수 머신러닝 · 딥러닝 웹앱</h1>
      <p class="text-slate-300 mt-3 text-sm">네이버 크롤링 → 군집화 → ML 예측 → DL 예측을 버튼 4개로 실행합니다.</p>
      <a href="/docs" target="_blank" class="inline-block mt-4 text-xs px-3 py-2 rounded bg-indigo-600 hover:bg-indigo-500">API 문서 열기</a>
    </header>

    <section class="bg-slate-900/80 border border-slate-700 rounded-xl p-4 md:p-5 mb-6">
      <h2 class="font-semibold mb-4">공통 입력</h2>
      <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
        <label class="text-sm">대표 종목코드
          <input id="ticker" class="mt-1 w-full rounded bg-slate-800 border border-slate-600 px-3 py-2" value="005930" />
        </label>
        <label class="text-sm">페이지 수
          <input id="pages" type="number" min="1" max="80" class="mt-1 w-full rounded bg-slate-800 border border-slate-600 px-3 py-2" value="10" />
        </label>
        <label class="text-sm">시장
          <select id="market" class="mt-1 w-full rounded bg-slate-800 border border-slate-600 px-3 py-2">
            <option value="kospi">KOSPI</option>
            <option value="kosdaq">KOSDAQ</option>
          </select>
        </label>
        <label class="text-sm">군집 종목(쉼표 구분)
          <input id="tickers" class="mt-1 w-full rounded bg-slate-800 border border-slate-600 px-3 py-2" value="005930,000660,035420,051910,068270" />
        </label>
      </div>
    </section>

    <section class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
      <button id="btn-crawl" class="h-28 rounded-2xl bg-blue-600 hover:bg-blue-500 transition text-left px-6 py-4 shadow-lg shadow-blue-900/30">
        <p class="text-xs text-blue-100">STEP 1</p>
        <p class="text-2xl font-bold mt-1">데이터 수집</p>
        <p class="text-sm text-blue-100 mt-1">네이버 금융 크롤링 실행</p>
      </button>
      <button id="btn-cluster" class="h-28 rounded-2xl bg-emerald-600 hover:bg-emerald-500 transition text-left px-6 py-4 shadow-lg shadow-emerald-900/30">
        <p class="text-xs text-emerald-100">STEP 2</p>
        <p class="text-2xl font-bold mt-1">종목 군집화</p>
        <p class="text-sm text-emerald-100 mt-1">특성 기반 군집 및 해석</p>
      </button>
      <button id="btn-ml" class="h-28 rounded-2xl bg-violet-600 hover:bg-violet-500 transition text-left px-6 py-4 shadow-lg shadow-violet-900/30">
        <p class="text-xs text-violet-100">STEP 3</p>
        <p class="text-2xl font-bold mt-1">ML 방향 예측</p>
        <p class="text-sm text-violet-100 mt-1">학습 + 신호 예측 + 확률</p>
      </button>
      <button id="btn-dl" class="h-28 rounded-2xl bg-rose-600 hover:bg-rose-500 transition text-left px-6 py-4 shadow-lg shadow-rose-900/30">
        <p class="text-xs text-rose-100">STEP 4</p>
        <p class="text-2xl font-bold mt-1">DL 방향 예측</p>
        <p class="text-sm text-rose-100 mt-1">LSTM/MLP 학습 + 예측</p>
      </button>
    </section>

    <section class="bg-slate-900/80 border border-slate-700 rounded-xl p-4 md:p-5">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-semibold">실행 결과</h2>
        <span id="status" class="text-xs px-2 py-1 rounded bg-slate-700">대기 중</span>
      </div>
      <pre id="result" class="text-xs bg-black/40 rounded p-4 overflow-auto min-h-[260px]">버튼을 눌러 실행하세요.</pre>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');

    const getCommon = () => ({
      ticker: document.getElementById('ticker').value.trim(),
      pages: Number(document.getElementById('pages').value || 10),
      market: document.getElementById('market').value,
      tickers: document.getElementById('tickers').value.split(',').map(v => v.trim()).filter(Boolean),
    });

    const setStatus = (text, ok = null) => {
      statusEl.textContent = text;
      statusEl.className = 'text-xs px-2 py-1 rounded ' + (ok === null
        ? 'bg-slate-700'
        : ok
          ? 'bg-emerald-700'
          : 'bg-rose-700');
    };

    async function runAction(name, url, payload) {
      setStatus(`${name} 실행 중...`, null);
      resultEl.textContent = `${name} 요청 중...`;
      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(JSON.stringify(data, null, 2));
        setStatus(`${name} 완료`, true);
        resultEl.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        setStatus(`${name} 실패`, false);
        resultEl.textContent = String(err.message || err);
      }
    }

    document.getElementById('btn-crawl').addEventListener('click', () => {
      const c = getCommon();
      runAction('데이터 수집', '/api/webapp/crawl', {
        ticker: c.ticker,
        market: c.market,
        pages: c.pages,
      });
    });

    document.getElementById('btn-cluster').addEventListener('click', () => {
      const c = getCommon();
      runAction('종목 군집화', '/api/webapp/cluster', {
        tickers: c.tickers,
        pages: c.pages,
        n_clusters: 3,
        method: 'kmeans',
      });
    });

    document.getElementById('btn-ml').addEventListener('click', () => {
      const c = getCommon();
      runAction('ML 방향 예측', '/api/webapp/ml-predict', {
        ticker: c.ticker,
        source: 'naver',
        pages: Math.max(c.pages, 30),
        period: '3y',
        model_type: 'rf',
        forward_days: 5,
        threshold: 0.01,
      });
    });

    document.getElementById('btn-dl').addEventListener('click', () => {
      const c = getCommon();
      runAction('DL 방향 예측', '/api/webapp/dl-predict', {
        ticker: c.ticker,
        source: 'naver',
        pages: Math.max(c.pages, 30),
        period: '3y',
        model_type: 'auto',
        seq_len: 20,
        forward_days: 5,
        threshold: 0.01,
        epochs: 20,
      });
    });
  </script>
</body>
</html>
