<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>국내 주가 ML·DL 웹앱</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: 'Pretendard Variable', 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      word-break: keep-all;
    }
    /* Maintain minimum readability even when Tailwind CDN fails to load */
    main { max-width: 1200px; margin: 0 auto; }
    input, select, button { font: inherit; }
    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #summary-grid > div, #charts-grid > div, #notes-box, pre {
      border: 1px solid rgba(148, 163, 184, 0.3);
      border-radius: 10px;
    }
    @media (min-width: 1024px) {
      section.mt-6 { display: grid; grid-template-columns: 360px minmax(0, 1fr); gap: 24px; }
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-slate-950 via-slate-900 to-slate-950 text-slate-100">
  <main class="mx-auto max-w-7xl px-4 py-8 md:px-6">
    <header class="rounded-2xl border border-slate-800/80 bg-slate-900/65 p-6 shadow-2xl shadow-slate-950/60">
      <p class="text-sm font-medium tracking-wide text-cyan-300">Stock ML·DL Dashboard</p>
      <h1 class="mt-1 text-3xl font-semibold md:text-4xl">국내 주가 시계열 분석 대시보드</h1>
      <p class="mt-3 max-w-4xl text-sm leading-6 text-slate-300">
        이 리포지토리의 핵심 기능(데이터 수집 · 군집화 · ML · DL 예측)을 한 화면에서 실행하고 결과를 확인할 수 있도록 구성했습니다.
      </p>
      <div class="mt-4 flex flex-wrap gap-2 text-xs text-slate-300">
        <a href="/docs" target="_blank" class="rounded-lg border border-cyan-700/70 bg-cyan-950/40 px-3 py-2 hover:bg-cyan-900/40">API 문서</a>
        <span class="rounded-lg border border-slate-700/80 bg-slate-800/45 px-3 py-2">KOSPI/KOSDAQ</span>
        <span class="rounded-lg border border-slate-700/80 bg-slate-800/45 px-3 py-2">시계열 분석</span>
        <span class="rounded-lg border border-slate-700/80 bg-slate-800/45 px-3 py-2">ML · DL 예측</span>
        <span class="rounded-lg border border-slate-700/80 bg-slate-800/45 px-3 py-2">MongoDB CRUD</span>
      </div>
    </header>

    <section class="mt-6 grid gap-6 lg:grid-cols-[360px_minmax(0,1fr)]">
      <aside class="space-y-6">
        <section class="rounded-xl border border-slate-800 bg-slate-900/70 p-4 shadow-xl shadow-slate-950/40">
          <h2 class="text-sm font-semibold text-slate-100">공통 입력</h2>
          <div class="mt-4 grid gap-3">
            <label class="text-sm text-slate-300">대표 종목코드
              <input id="ticker" class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2" value="005930" />
            </label>
            <label class="text-sm text-slate-300">비교 종목코드
              <input id="tickers" class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2" value="005930,000660,035420,051910" />
            </label>
            <div class="grid grid-cols-2 gap-3">
              <label class="text-sm text-slate-300">소스
                <select id="source" class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2">
                  <option value="naver">naver</option>
                  <option value="yfinance">yfinance</option>
                </select>
              </label>
              <label class="text-sm text-slate-300">시장
                <select id="market" class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2">
                  <option value="kospi">KOSPI</option>
                  <option value="kosdaq">KOSDAQ</option>
                </select>
              </label>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <label class="text-sm text-slate-300">페이지 수
                <input id="pages" type="number" min="5" max="120" class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2" value="80" />
              </label>
              <label class="text-sm text-slate-300">기간
                <input id="period" class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2" value="5y" />
              </label>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <label class="text-sm text-slate-300">시퀀스 길이
                <input id="seq_len" type="number" min="5" max="60" class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2" value="20" />
              </label>
              <label class="text-sm text-slate-300">군집 수
                <input id="n_clusters" type="number" min="2" max="8" class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2" value="3" />
              </label>
            </div>
          </div>
        </section>

        <section class="rounded-xl border border-slate-800 bg-slate-900/70 p-4 shadow-xl shadow-slate-950/40">
          <h2 class="text-sm font-semibold text-slate-100">기존 운영 액션</h2>
          <div class="mt-4 grid gap-2">
            <button data-action="crawl" class="action-btn rounded-lg bg-cyan-600/90 px-4 py-3 text-left hover:bg-cyan-500">
              <div class="text-xs text-blue-100">기존 WebApp</div>
              <div class="mt-1 font-semibold">데이터 수집</div>
            </button>
            <button data-action="cluster" class="action-btn rounded-lg bg-emerald-600/90 px-4 py-3 text-left hover:bg-emerald-500">
              <div class="text-xs text-emerald-100">기존 WebApp</div>
              <div class="mt-1 font-semibold">종목 군집화</div>
            </button>
            <button data-action="ml" class="action-btn rounded-lg bg-indigo-600/90 px-4 py-3 text-left hover:bg-indigo-500">
              <div class="text-xs text-violet-100">기존 WebApp</div>
              <div class="mt-1 font-semibold">ML 방향 예측</div>
            </button>
            <button data-action="dl" class="action-btn rounded-lg bg-fuchsia-600/90 px-4 py-3 text-left hover:bg-fuchsia-500">
              <div class="text-xs text-rose-100">기존 WebApp</div>
              <div class="mt-1 font-semibold">DL 방향 예측</div>
            </button>
          </div>
        </section>

        <section class="rounded-xl border border-slate-800 bg-slate-900/70 p-4 shadow-xl shadow-slate-950/40">
          <h2 class="text-sm font-semibold text-slate-100">MongoDB CRUD</h2>
          <div class="mt-3 grid gap-3">
            <label class="text-sm text-slate-300">사용자명
              <input id="mongo-user" class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2" value="demo_user" />
            </label>
            <label class="text-sm text-slate-300">비밀번호
              <input id="mongo-pass" type="password" class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2" placeholder="비밀번호 입력" />
            </label>
            <label class="text-sm text-slate-300">권한(role)
              <input id="mongo-role" class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2" value="user" />
            </label>
            <label class="text-sm text-slate-300">삭제 타입
              <select id="mongo-delete-type" class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2">
                <option value="users">users</option>
                <option value="crawls">crawls</option>
                <option value="analyses">analyses</option>
              </select>
            </label>
            <label class="text-sm text-slate-300">삭제 대상 ID
              <input id="mongo-delete-id" class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2" placeholder="MongoDB document id" />
            </label>
          </div>
          <div class="mt-3 grid grid-cols-2 gap-2 text-sm">
            <button data-action="mongo-create-user" data-requires-mongo="true" class="action-btn rounded-lg bg-sky-700 px-3 py-2 hover:bg-sky-600">사용자 생성</button>
            <button data-action="mongo-login" data-requires-mongo="true" class="action-btn rounded-lg bg-indigo-700 px-3 py-2 hover:bg-indigo-600">사용자 로그인</button>
            <button data-action="mongo-list-users" data-requires-mongo="true" class="action-btn rounded-lg bg-slate-700 px-3 py-2 hover:bg-slate-600">사용자 목록</button>
            <button data-action="mongo-list-crawls" data-requires-mongo="true" class="action-btn rounded-lg bg-slate-700 px-3 py-2 hover:bg-slate-600">크롤링 목록</button>
            <button data-action="mongo-list-analyses" data-requires-mongo="true" class="action-btn rounded-lg bg-slate-700 px-3 py-2 hover:bg-slate-600">분석 목록</button>
            <button data-action="mongo-delete-doc" data-requires-mongo="true" class="action-btn rounded-lg bg-rose-700 px-3 py-2 hover:bg-rose-600">ID로 문서 삭제</button>
          </div>
        </section>
      </aside>

      <section class="space-y-6">
        <div class="rounded-xl border border-slate-800 bg-slate-900/70 p-4 shadow-xl shadow-slate-950/40">
          <div class="flex flex-wrap items-center justify-between gap-3">
            <div>
              <h2 id="result-title" class="text-lg font-semibold">실행 결과</h2>
              <p id="result-subtitle" class="mt-1 text-sm text-slate-400">왼쪽 액션을 선택하면 요약과 차트가 이쪽에 나타납니다.</p>
            </div>
            <span id="status" class="rounded-lg bg-slate-800 px-3 py-2 text-xs text-slate-200">대기 중</span>
          </div>
        </div>

        <div id="summary-grid" class="grid gap-3 md:grid-cols-2 xl:grid-cols-4"></div>

        <div id="notes-box" class="hidden rounded-lg border border-slate-800 bg-slate-900/70 p-4">
          <h3 class="text-sm font-semibold text-slate-100">핵심 메모</h3>
          <ul id="notes-list" class="mt-3 space-y-2 text-sm text-slate-300"></ul>
        </div>

        <div id="charts-grid" class="grid gap-4 xl:grid-cols-2"></div>

        <div class="rounded-xl border border-slate-800 bg-slate-900/70 p-4 shadow-xl shadow-slate-950/40">
          <h3 class="text-sm font-semibold text-slate-100">원본 응답</h3>
          <pre id="result" class="mt-3 min-h-[240px] overflow-auto rounded-lg bg-black/40 p-4 text-xs leading-5 text-slate-200">버튼을 눌러 실행하세요.</pre>
        </div>
      </section>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');
    const summaryGrid = document.getElementById('summary-grid');
    const chartsGrid = document.getElementById('charts-grid');
    const notesBox = document.getElementById('notes-box');
    const notesList = document.getElementById('notes-list');
    const resultTitle = document.getElementById('result-title');
    const resultSubtitle = document.getElementById('result-subtitle');
    const MONGO_HEALTH_ENDPOINT = '/api/mongo/health';
    const mongoActionButtons = Array.from(document.querySelectorAll('[data-requires-mongo="true"]'));
    let mongoReady = false;
    let activeCharts = [];

    const getCommon = () => ({
      ticker: document.getElementById('ticker').value.trim(),
      tickers: document.getElementById('tickers').value.split(',').map(v => v.trim()).filter(Boolean),
      source: document.getElementById('source').value,
      market: document.getElementById('market').value,
      pages: Number(document.getElementById('pages').value || 80),
      period: document.getElementById('period').value.trim() || '5y',
      seq_len: Number(document.getElementById('seq_len').value || 20),
      n_clusters: Number(document.getElementById('n_clusters').value || 3),
    });

    const getMongoCommon = () => ({
      username: document.getElementById('mongo-user').value.trim(),
      password: document.getElementById('mongo-pass').value,
      role: document.getElementById('mongo-role').value.trim() || 'user',
      deleteType: document.getElementById('mongo-delete-type').value,
      deleteId: document.getElementById('mongo-delete-id').value.trim(),
    });

    const setStatus = (text, ok = null) => {
      statusEl.textContent = text;
      statusEl.className = 'rounded-lg px-3 py-2 text-xs ' + (ok === null
        ? 'bg-slate-800 text-slate-200'
        : ok
          ? 'bg-emerald-700 text-white'
          : 'bg-rose-700 text-white');
    };

    const clearVisuals = () => {
      summaryGrid.innerHTML = '';
      chartsGrid.innerHTML = '';
      notesList.innerHTML = '';
      notesBox.classList.add('hidden');
      activeCharts.forEach(chart => chart.destroy());
      activeCharts = [];
    };

    const updateMongoStatus = (ready, message = '') => {
      mongoReady = ready;
      mongoActionButtons.forEach(btn => { btn.disabled = !ready; });
      if (!ready && message) {
        setStatus('Mongo 연결 필요', false);
        resultTitle.textContent = 'MongoDB 상태';
        resultSubtitle.textContent = MONGO_HEALTH_ENDPOINT;
        resultEl.textContent = message;
      }
    };

    const renderSummary = (items = []) => {
      summaryGrid.innerHTML = '';
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'rounded-lg border border-slate-800 bg-slate-900/70 p-4';
        card.innerHTML = `
          <div class="text-xs text-slate-400">${item.label}</div>
          <div class="mt-2 text-lg font-semibold text-slate-100">${item.value}</div>
        `;
        summaryGrid.appendChild(card);
      });
    };

    const renderNotes = (notes = []) => {
      notesList.innerHTML = '';
      if (!notes.length) {
        notesBox.classList.add('hidden');
        return;
      }
      notes.forEach(note => {
        const li = document.createElement('li');
        li.textContent = note;
        notesList.appendChild(li);
      });
      notesBox.classList.remove('hidden');
    };

    const datasetDefaults = (chartType, ds) => ({
      label: ds.label,
      data: ds.data,
      borderColor: ds.borderColor || ds.backgroundColor || '#60a5fa',
      backgroundColor: ds.backgroundColor || ds.borderColor || '#60a5fa',
      fill: false,
      tension: chartType === 'line' ? 0.25 : 0,
      borderWidth: 2,
    });

    const renderCharts = (charts = []) => {
      chartsGrid.innerHTML = '';
      activeCharts.forEach(chart => chart.destroy());
      activeCharts = [];
      charts.forEach((chartConfig, index) => {
        const wrap = document.createElement('div');
        wrap.className = charts.length === 1
          ? 'rounded-lg border border-slate-800 bg-slate-900/70 p-4'
          : 'rounded-lg border border-slate-800 bg-slate-900/70 p-4';
        wrap.innerHTML = `
          <div class="mb-3 text-sm font-semibold text-slate-100">${chartConfig.title || `차트 ${index + 1}`}</div>
          <canvas id="chart-${index}" height="180"></canvas>
        `;
        chartsGrid.appendChild(wrap);
        const canvas = wrap.querySelector('canvas');
        const chart = new Chart(canvas, {
          type: chartConfig.type || 'line',
          data: {
            labels: chartConfig.labels || [],
            datasets: (chartConfig.datasets || []).map(ds => datasetDefaults(chartConfig.type || 'line', ds)),
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              x: { ticks: { color: '#cbd5e1', maxRotation: 0, autoSkip: true }, grid: { color: 'rgba(148,163,184,0.12)' } },
              y: { ticks: { color: '#cbd5e1' }, grid: { color: 'rgba(148,163,184,0.12)' } },
            },
            plugins: {
              legend: { labels: { color: '#e2e8f0' } },
            },
          },
        });
        activeCharts.push(chart);
      });
    };

    async function runAction(name, url, payload) {
      setStatus(`${name} 실행 중...`, null);
      resultTitle.textContent = name;
      resultSubtitle.textContent = url;
      resultEl.textContent = `${name} 요청 중...`;
      clearVisuals();

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(JSON.stringify(data, null, 2));
        setStatus(`${name} 완료`, true);
        resultEl.textContent = JSON.stringify(data, null, 2);
        renderSummary(data.summary || []);
        renderNotes(data.notes || []);
        renderCharts(data.charts || []);
        if (!data.summary) {
          renderSummary([
            { label: 'Ticker', value: data.ticker || payload.ticker || '-' },
            { label: '상태', value: '완료' },
          ]);
        }
      } catch (err) {
        setStatus(`${name} 실패`, false);
        resultEl.textContent = String(err.message || err);
      }
    }

    const summarizeMongoDocs = (data) => {
      if (Array.isArray(data)) return data;
      if (data && typeof data === 'object') {
        if (data.user && typeof data.user === 'object') return [data.user];
        if (data.id) return [data];
      }
      return [];
    };

    async function runMongoAction(name, url, method = 'GET', payload = null) {
      if (!mongoReady) {
        setStatus(`${name} 실패`, false);
        resultEl.textContent = `MongoDB 연결 후 다시 시도하세요. (${MONGO_HEALTH_ENDPOINT})`;
        return;
      }
      setStatus(`${name} 실행 중...`, null);
      resultTitle.textContent = name;
      resultSubtitle.textContent = `${method} ${url}`;
      resultEl.textContent = `${name} 요청 중...`;
      clearVisuals();
      try {
        const options = { method, headers: { 'Content-Type': 'application/json' } };
        if (payload) options.body = JSON.stringify(payload);
        const res = await fetch(url, options);
        const data = await res.json();
        if (!res.ok) throw new Error(JSON.stringify(data, null, 2));
        setStatus(`${name} 완료`, true);
        resultEl.textContent = JSON.stringify(data, null, 2);
        const docs = summarizeMongoDocs(data);
        if (docs.length) {
          renderSummary([
            { label: '문서 개수', value: String(docs.length) },
            { label: '최신 문서 ID', value: docs[0].id || '-' },
          ]);
          renderNotes(docs.slice(0, 5).map((d, idx) => `${idx + 1}. ${d.username || d.analysis_type || d.ticker || d.id || '-'}`));
        } else {
          renderSummary([{ label: 'MongoDB', value: '요청 성공' }]);
        }
      } catch (err) {
        setStatus(`${name} 실패`, false);
        resultEl.textContent = String(err.message || err);
      }
    }

    async function checkMongoHealth() {
      try {
        const res = await fetch(MONGO_HEALTH_ENDPOINT);
        const data = await res.json();
        if (res.ok && data?.status === 'ok') {
          updateMongoStatus(true);
          return;
        }
        updateMongoStatus(false, JSON.stringify(data, null, 2));
      } catch (err) {
        updateMongoStatus(
          false,
          err?.message
            || err?.toString?.()
            || `Failed to connect to ${MONGO_HEALTH_ENDPOINT}. Please check if MongoDB is running.`,
        );
      }
    }

    const actions = {
      crawl: () => {
        const c = getCommon();
        return runAction('데이터 수집', '/api/webapp/crawl', {
          ticker: c.ticker,
          market: c.market,
          pages: Math.min(c.pages, 20),
        });
      },
      cluster: () => {
        const c = getCommon();
        return runAction('종목 군집화', '/api/webapp/cluster', {
          tickers: c.tickers,
          pages: Math.min(c.pages, 20),
          n_clusters: c.n_clusters,
          method: 'kmeans',
        });
      },
      ml: () => {
        const c = getCommon();
        return runAction('ML 방향 예측', '/api/webapp/ml-predict', {
          ticker: c.ticker,
          source: c.source,
          pages: Math.max(c.pages, 30),
          period: c.period,
          model_type: 'rf',
          forward_days: 5,
          threshold: 0.01,
        });
      },
      dl: () => {
        const c = getCommon();
        return runAction('DL 방향 예측', '/api/webapp/dl-predict', {
          ticker: c.ticker,
          source: c.source,
          pages: Math.max(c.pages, 30),
          period: c.period,
          model_type: 'auto',
          seq_len: c.seq_len,
          forward_days: 5,
          threshold: 0.01,
          epochs: 20,
        });
      },
      'mongo-create-user': () => {
        const m = getMongoCommon();
        return runMongoAction('Mongo 사용자 생성', '/api/mongo/users', 'POST', {
          username: m.username,
          password: m.password,
          role: m.role,
        });
      },
      'mongo-login': () => {
        const m = getMongoCommon();
        return runMongoAction('Mongo 로그인', '/api/mongo/auth/login', 'POST', {
          username: m.username,
          password: m.password,
        });
      },
      'mongo-list-users': () => runMongoAction('Mongo 사용자 목록', '/api/mongo/users?limit=20'),
      'mongo-list-crawls': () => runMongoAction('Mongo 크롤링 목록', '/api/mongo/crawls?limit=20'),
      'mongo-list-analyses': () => runMongoAction('Mongo 분석 목록', '/api/mongo/analyses?limit=20'),
      'mongo-delete-doc': () => {
        const m = getMongoCommon();
        if (!m.deleteId) {
          setStatus('삭제 실패', false);
          resultEl.textContent = '삭제할 ID를 입력하세요.';
          return;
        }
        return runMongoAction(
          'Mongo 문서 삭제',
          `/api/mongo/${m.deleteType}/${m.deleteId}`,
          'DELETE',
        );
      },
    };

    document.querySelectorAll('.action-btn').forEach(btn => {
      btn.addEventListener('click', () => {
