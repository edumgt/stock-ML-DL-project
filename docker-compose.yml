version: '3.9'
x-common-env:
  MONGODB_URI: mongodb://mongo:27017
  MONGODB_DB_NAME: stock_mldl
x-service-base:
  build: &id001
    context: .
    dockerfile: Dockerfile
    target: runtime
  restart: unless-stopped
services:
  django-web:
    build: *id001
    restart: unless-stopped
    command:
    - python
    - manage.py
    - runserver
    - 0.0.0.0:8000
    environment:
      FLASK_API_BASE_URL: http://localhost:5000
      AIRFLOW_UI_URL: http://localhost:8080
    ports:
    - 8931:8000
    volumes:
    - .:/app
    networks:
    - shared-net
  flask-api:
    build: *id001
    restart: unless-stopped
    command:
    - flask
    - --app
    - flask_api.app
    - run
    - --host
    - 0.0.0.0
    - --port
    - '5000'
    - --debug
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB_NAME: stock_mldl
      FLASK_ENV: development
      CORS_ORIGINS: http://localhost:8000,http://localhost:8931,http://127.0.0.1:8000,http://127.0.0.1:8931
    ports:
    - 5000:5000
    volumes:
    - .:/app
    networks:
    - shared-net
  airflow:
    image: apache/airflow:2.10.5-python3.11
    restart: unless-stopped
    depends_on:
    - flask-api
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB_NAME: stock_mldl
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__WEBSERVER__SECRET_KEY: stock-mldl-airflow
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      FLASK_API_BASE_URL: http://flask-api:5000
      PYTHONPATH: /opt/airflow/project
      _PIP_ADDITIONAL_REQUIREMENTS: pymongo requests beautifulsoup4 lxml yfinance pandas numpy scikit-learn scipy joblib xgboost
    ports:
    - 8080:8080
    volumes:
    - ./airflow/dags:/opt/airflow/dags
    - .:/opt/airflow/project
    command: |
      bash -lc "airflow db migrate && airflow users create --username admin --password admin --firstname Stock --lastname Admin --role Admin --email admin@example.com || true && airflow standalone"
    networks:
    - shared-net
networks:
  shared-net:
    external: true
