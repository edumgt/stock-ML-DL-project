version: "3.9"

# ─────────────────────────────────────────────────
#  Stock ML/DL Project – MSA 로컬 개발 환경
#  실행: docker compose up --build
#  웹앱: http://localhost:8000
# ─────────────────────────────────────────────────

x-common-env: &common-env
  MONGODB_URI: mongodb://mongo:27017
  MONGODB_DB_NAME: stock_mldl

x-service-base: &service-base
  build:
    context: .
    dockerfile: Dockerfile
    target: runtime
  restart: unless-stopped
  depends_on:
    mongo:
      condition: service_healthy

services:
  # ── MongoDB ────────────────────────────────────
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── API Gateway (프론트엔드 + 웹앱 대시보드 API) ─
  api-gateway:
    <<: *service-base
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      <<: *common-env
    ports:
      - "8000:8000"
    volumes:
      - .:/app  # 핫 리로드를 위해 소스 마운트

  # ── ML/DL Service ──────────────────────────────
  ml-service:
    <<: *service-base
    command: ["uvicorn", "services.ml_service:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      <<: *common-env
    ports:
      - "8001:8000"
    volumes:
      - .:/app

  # ── Crawler Service ────────────────────────────
  crawler-service:
    <<: *service-base
    command: ["uvicorn", "services.crawler_service:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      <<: *common-env
    ports:
      - "8002:8000"
    volumes:
      - .:/app

  # ── Mongo CRUD Service ─────────────────────────
  mongo-service:
    <<: *service-base
    command: ["uvicorn", "services.mongo_service:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      <<: *common-env
    ports:
      - "8003:8000"
    volumes:
      - .:/app

volumes:
  mongo_data:
    driver: local
