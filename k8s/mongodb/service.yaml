apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: stock-mldl
  labels:
    app: mongodb
    app.kubernetes.io/part-of: stock-mldl
spec:
  # ClusterIP: 클러스터 내부 전용 (외부 미노출)
  type: ClusterIP
  selector:
    app: mongodb
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
