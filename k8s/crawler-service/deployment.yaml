apiVersion: apps/v1
kind: Deployment
metadata:
  name: crawler-service
  namespace: stock-mldl
  labels:
    app: crawler-service
    app.kubernetes.io/part-of: stock-mldl
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crawler-service
  template:
    metadata:
      labels:
        app: crawler-service
    spec:
      containers:
        - name: crawler-service
          image: stock-mldl:latest
          imagePullPolicy: IfNotPresent
          command:
            - uvicorn
            - services.crawler_service:app
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: stock-mldl-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
