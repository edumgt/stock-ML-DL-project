apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: stock-mldl
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: stock-mldl
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          # TODO: 실제 이미지 레지스트리 경로로 변경하세요.
          # 예: ghcr.io/edumgt/stock-mldl:latest
          image: stock-mldl:latest
          imagePullPolicy: IfNotPresent
          command:
            - uvicorn
            - api.main:app
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: stock-mldl-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
